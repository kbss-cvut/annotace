application.version=${version}

annotace.lemmatizer=spark
annotace.ker.service=http://lindat.mff.cuni.cz/services/ker?language=cs&threshold=0.04&maximum-words=30

annotace.spark.lemmatizers.cs=model:lemma
annotace.spark.lemmatizers.en=pipeline:explain_document_ml

annotace.morphodita.taggers.cs=czech-morfflex-pdt-161115.tagger
annotace.morphodita.taggers.en=english-morphium-wsj-140407.tagger

# Index sibling modules so Arc can discover their beans
quarkus.index-dependency.api.group-id=cz.cvut.kbss
quarkus.index-dependency.api.artifact-id=api
quarkus.index-dependency.ker.group-id=cz.cvut.kbss
quarkus.index-dependency.ker.artifact-id=keywordextractor-ker
quarkus.index-dependency.spark.group-id=cz.cvut.kbss
quarkus.index-dependency.spark.artifact-id=lemmatizer-spark
quarkus.index-dependency.morphodita.group-id=cz.cvut.kbss
quarkus.index-dependency.morphodita.artifact-id=lemmatizer-morphodita

quarkus.http.port=8080
